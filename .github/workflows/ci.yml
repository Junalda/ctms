name: CI

# Draait een Astro-build zodat kapotte code niet doorstroomt:
# - bij elke push naar staging (vroege signalering tijdens het werk)
# - bij elke pull request richting main (blokkeert de merge als de build faalt)
on:
  push:
    branches: [staging]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Annuleer een lopende run als er snel een nieuwe commit op dezelfde ref komt.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node opzetten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Dependencies installeren
        run: npm ci

      - name: Astro-build
        run: npm run build
